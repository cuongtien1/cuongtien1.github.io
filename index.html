<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Untitled Document</title>
	<link rel="stylesheet" href="css/style.css">
	<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
	<div class="container">
		<div class="header">
			<nav class="menu"></nav>
			<div class="logo"></div>
		</div>
<!--		header-->
		<div class="vertical-menu">
			<ul class="menu">
				<li><a href="#home">Home</a></li>
				<li><a href="#about">About us</a></li>
				<li><a href="">Contact</a></li>
			</ul>
		</div>
<!--		vertical menu-->
		<section class="bg-1 child" id="home">
			<a href="#about" class="scroll-down"> &#8592; Scroll down	</a>
			<div class="banner-img"></div>
			<div class="banner-text"></div>
		</section>
		<section class="bg-2 child" id="about">
			<h1 data-aos-delay="1000" data-aos-duration="2000" data-aos="fade-up-right" style="font-size: 100px;margin:100px;">Vi du animation Scroll</h1>
		</section>
		<section class="bg-3 child"></section>
	</div>
	<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
	<script>
  AOS.init();
</script>
	<script src="https://code.jquery.com/jquery-1.12.4.min.js" integrity="sha384-nvAa0+6Qg9clwYCGGPpDQLVpLNn0fRaROjHqs13t4Ggj3Ez50XnGQqc/r8MhnRDZ" crossorigin="anonymous"></script>
<script src="js/jquery.scroll-spy.js"></script>
<script>
    $('.container').scrollSpy({
        target: $('.menu a')
    }).scroll();
</script>
</body>
</html>
